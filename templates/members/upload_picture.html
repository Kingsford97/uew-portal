{% extends 'base.html' %}

{% block title %}Upload Profile Picture - UEW Association{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-shadow">
            <div class="card-header bg-primary text-white">
                <h4>Upload Profile Picture</h4>
            </div>
            <div class="card-body text-center">
                {% if member.profile_picture %}
                    <img src="{{ member.profile_picture.url }}" alt="Current Profile" class="profile-pic mb-3" style="width:150px;height:150px;">
                    <p class="text-muted">Current Profile Picture</p>
                {% endif %}

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="profile_picture" class="form-label">Choose New Picture</label>
                        <input type="file" class="form-control" id="profile_picture" name="profile_picture" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload</button>
                    <a href="{% url 'member_dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
