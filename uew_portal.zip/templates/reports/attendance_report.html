{% extends 'base.html' %}

{% block title %}Attendance Report - UEW SMS{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Attendance Report</h1>

    <div class="row">
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Total Records</div>
                        <div class="stat-number">{{ total_attendances }}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Present</div>
                        <div class="stat-number">{{ present }}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Absent</div>
                        <div class="stat-number">{{ absent }}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Attendance Rate</div>
                        <div class="stat-number">{{ attendance_rate|floatformat:1 }}%</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
