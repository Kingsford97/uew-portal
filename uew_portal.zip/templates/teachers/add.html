{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Teacher - UEW SMS{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Add New Teacher</h1>
    <div class="card">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-success">Add Teacher</button>
                <a href="{% url 'teachers:list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}z
